# Red Hat AI Gateway (llm-d) for internal cluster routing.
# All client traffic (DevSpaces, OpenCode) reaches the model through this
# Gateway — never directly to the model pod. This provides a stable endpoint,
# TLS termination, and a path for future EPP-based intelligent routing.
#
# Internal DNS endpoint:
#   https://llm-d-gateway-data-science-gateway-class.ai-serving.svc.cluster.local
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: llm-d-gateway
  namespace: ai-serving
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  gatewayClassName: data-science-gateway-class
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: llm-d-gateway-tls
            kind: Secret
      allowedRoutes:
        namespaces:
          from: Same
---
# HTTPRoute: routes all /v1 inference traffic to the KServe predictor service.
# The KServe predictor service (port 80) proxies to the vLLM container (port 8000).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: model-route
  namespace: ai-serving
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: llm-d-gateway
      namespace: ai-serving
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      backendRefs:
        - group: ""
          kind: Service
          name: qwen36-vllm-predictor
          port: 80
          weight: 1
      timeouts:
        backendRequest: "0s"
        request: "0s"
