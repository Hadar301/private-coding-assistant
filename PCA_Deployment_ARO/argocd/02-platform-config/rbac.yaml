# RBAC for DevSpaces users — grants namespace admin in their respective namespaces.
# Users Dev1 and Dev2 are created via HTPasswd identity provider.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev1-admin
  namespace: dev1-devspaces
  annotations:
    argocd.argoproj.io/sync-wave: "1"
subjects:
  - kind: User
    name: Dev1
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: admin
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev2-admin
  namespace: dev2-devspaces
  annotations:
    argocd.argoproj.io/sync-wave: "1"
subjects:
  - kind: User
    name: Dev2
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: admin
  apiGroup: rbac.authorization.k8s.io
