# Cluster-wide VS Code extension recommendations for all DevSpaces workspaces.
# NOTE: "recommendations" only show extensions in the sidebar — they do NOT
# auto-install. For auto-installation, use the devfile component attribute:
#   che-code.eclipse.org/vscode-extensions:
#     - <vsix-url>
# This is already configured in devworkspaces.yaml and setup-devspaces-users.sh.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vscode-extensions-config
  namespace: openshift-devspaces
  labels:
    app.kubernetes.io/component: workspaces-config
    app.kubernetes.io/part-of: che.eclipse.org
    controller.devfile.io/watch-configmap: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  .vscode-extensions.json: |
    {
      "recommendations": [
        "sst-dev.opencode"
      ]
    }
