{{- if .Values.vllm.useCustomRuntime }}
# Custom ServingRuntime for upstream vLLM — used when RHOAI bundled vLLM does not
# support the target model architecture (e.g. Qwen3.5-MoE requires vLLM >= 0.18).
# ARO: vllm.useCustomRuntime: true, vllm.image: vllm/vllm-openai:v0.19.0
# ROSA: useCustomRuntime: false — uses LLMInferenceService with RHOAI bundled vLLM.
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-cuda-{{ .Values.model.name }}
  namespace: {{ .Values.namespace }}
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    openshift.io/display-name: "vLLM Custom ({{ .Values.vllm.image }})"
    opendatahub.io/template-display-name: "vLLM Custom"
    opendatahub.io/template-name: vllm-cuda-{{ .Values.model.name }}
    opendatahub.io/apiProtocol: REST
    opendatahub.io/accelerator-name: nvidia.com/gpu
spec:
  annotations:
    prometheus.io/port: "8000"
    prometheus.io/path: /metrics
    prometheus.io/scrape: "true"
  multiModel: false
  supportedModelFormats:
    - name: vLLM
      version: "1"
      autoSelect: true
  containers:
    - name: kserve-container
      image: {{ .Values.vllm.image }}
      command:
        - python3
        - -m
        - vllm.entrypoints.openai.api_server
      args:
        - --port=8000
        - --served-model-name={{ .Values.model.id }}
        - --trust-remote-code
        - --enable-prefix-caching
        - --enable-auto-tool-choice
        - --tool-call-parser={{ .Values.vllm.toolCallParser }}
        - --reasoning-parser={{ .Values.vllm.reasoningParser }}
      env:
        {{- range $key, $val := .Values.vllm.extraEnv }}
        - name: {{ $key }}
          value: {{ $val | quote }}
        {{- end }}
      ports:
        - containerPort: 8000
          name: http
          protocol: TCP
      startupProbe:
        httpGet:
          path: /health
          port: 8000
        initialDelaySeconds: 30
        periodSeconds: 30
        failureThreshold: 120
        timeoutSeconds: 10
      readinessProbe:
        httpGet:
          path: /health
          port: 8000
        periodSeconds: 10
        failureThreshold: 3
        timeoutSeconds: 5
      livenessProbe:
        httpGet:
          path: /health
          port: 8000
        periodSeconds: 30
        failureThreshold: 3
        timeoutSeconds: 10
      resources:
        requests:
          cpu: {{ .Values.hardware.cpu.request | quote }}
          memory: {{ .Values.hardware.memory.request }}
          nvidia.com/gpu: {{ .Values.hardware.gpuCount | quote }}
        limits:
          cpu: {{ .Values.hardware.cpu.limit | quote }}
          memory: {{ .Values.hardware.memory.limit }}
          nvidia.com/gpu: {{ .Values.hardware.gpuCount | quote }}
      volumeMounts:
        - name: model-cache
          mountPath: /model-cache
        - name: shm
          mountPath: /dev/shm
  volumes:
    - name: model-cache
      persistentVolumeClaim:
        claimName: model-cache
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 16Gi
{{- end }}
