{{- if .Values.vllm.useCustomRuntime }}
# InferenceService using custom ServingRuntime — paired with servingruntime.yaml.
# Used when LLMInferenceService + RHOAI bundled vLLM cannot serve the target model.
# Set vllm.useCustomRuntime: true and vllm.image in values-aro.yaml.
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: {{ .Values.model.name }}
  namespace: {{ .Values.namespace }}
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    openshift.io/display-name: {{ .Values.model.id | quote }}
    serving.kserve.io/deploymentMode: RawDeployment
    opendatahub.io/accelerator-name: nvidia.com/gpu
    opendatahub.io/dashboard: "true"
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 4
    tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: "present"
        effect: NoSchedule
    model:
      modelFormat:
        name: vLLM
      runtime: vllm-cuda-{{ .Values.model.name }}
      args:
        - --model={{ .Values.model.id }}
        - --served-model-name={{ .Values.model.servedName | default .Values.model.id }}
        - --tensor-parallel-size={{ .Values.hardware.gpuCount }}
        - --max-model-len={{ .Values.vllm.maxModelLen }}
      resources:
        requests:
          cpu: {{ .Values.hardware.cpu.request | quote }}
          memory: {{ .Values.hardware.memory.request }}
          nvidia.com/gpu: {{ .Values.hardware.gpuCount | quote }}
        limits:
          cpu: {{ .Values.hardware.cpu.limit | quote }}
          memory: {{ .Values.hardware.memory.limit }}
          nvidia.com/gpu: {{ .Values.hardware.gpuCount | quote }}
{{- end }}
