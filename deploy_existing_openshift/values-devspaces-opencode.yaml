# Values for OpenCode devspace deployment.
# Deploy with:
#   make devspace-opencode-deploy-existing-openshift DEV_NAMESPACE=dev-user2-devspaces AI_NAMESPACE=hacohen-ai-coder
#
# Prerequisites (run once before helm install):
#   oc create namespace dev-user2-devspaces
#   oc label namespace dev-user2-devspaces \
#     app.kubernetes.io/component=workspaces-namespace \
#     app.kubernetes.io/part-of=che.eclipse.org
#   oc annotate namespace dev-user2-devspaces che.eclipse.org/username=dev-user2
#
# After deploy, trigger the image build:
#   oc start-build devspaces-opencode -n opencode-build --follow

# aiServingNamespace is overridden at deploy time via --set AI_NAMESPACE
aiServingNamespace: "ai-serving"
modelId: "Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8"
opencodeBuild:
  enabled: true
  opencodeVersion: "1.15.13"
# Skip global ConfigMaps (continue-config, vscode-extensions-config) — owned
# by the dev-user1 release. Set enabled: true only if deploying as the first
# and only devspaces release on this cluster.
devspacesGlobalConfig:
  enabled: false
guardrails:
  enabled: false
  endpoint: ""
mcp:
  enabled: false
devspaces:
  - namespace: dev-user2-devspaces
    name: opencode-dev-user2
    user: dev-user2
    type: opencode
